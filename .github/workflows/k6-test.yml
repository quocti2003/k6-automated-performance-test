name: K6 Automated Performance Test

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-k6-test]

permissions:
  contents: write

jobs:
  k6-test:
    runs-on: ubuntu-latest

    # PostgreSQL chay song song voi job, backend se ket noi vao day
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: mirror_product
          POSTGRES_USER: mirror_user
          POSTGRES_PASSWORD: mirror_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mirror_user -d mirror_product"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Buoc 1: Checkout Repo B (lay k6 scripts)
      - name: Checkout k6 test repo
        uses: actions/checkout@v4

      # Buoc 2: Checkout Repo A (backend source + Dockerfile)
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: quocti2003/MYRROR
          ref: full-local
          token: ${{ secrets.PAT_TOKEN }}
          path: backend

      # Buoc 3: Restore database schema + test user data
      - name: Restore database
        run: |
          PGPASSWORD=mirror_password psql -h localhost -U mirror_user -d mirror_product -f db/schema_only.sql 2>&1 || true
          echo "=== Schema restored ==="
          PGPASSWORD=mirror_password psql -h localhost -U mirror_user -d mirror_product -f db/seed_test_user.sql
          echo "=== Verify user tile ==="
          PGPASSWORD=mirror_password psql -h localhost -U mirror_user -d mirror_product -c "SELECT username, email, password FROM users WHERE username='tile';"

      # Buoc 4: Build Docker image tu Dockerfile cua Repo A
      - name: Build backend Docker image
        run: |
          cd backend/mirror-products-service
          docker build -t backend-service .

      # Buoc 5: Start backend container
      # --network=host de backend truy cap duoc PostgreSQL tren localhost:5432
      # Liquibase disabled vi schema da duoc restore tu dump
      - name: Start backend service
        run: |
          docker run -d --network=host --name backend \
            -e USE_SECRETS_MANAGER=false \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/mirror_product \
            -e SPRING_DATASOURCE_USERNAME=mirror_user \
            -e SPRING_DATASOURCE_PASSWORD=mirror_password \
            -e SPRING_LIQUIBASE_ENABLED=false \
            -e JWT_USE_SECRETS_MANAGER=false \
            -e JWT_SECRET=local-dev-jwt-secret-key-mirror-diamond-2024-must-be-at-least-256-bits-long \
            -e JWT_EXPIRATION=3600 \
            -e JWT_REFRESH_EXPIRATION=86400 \
            -e AWS_REGION=ap-southeast-1 \
            -e AWS_ACCESS_KEY_ID=dummy \
            -e AWS_SECRET_ACCESS_KEY=dummy \
            -e CLOUDFLARE_R2_ENABLED=true \
            -e CLOUDFLARE_R2_ACCOUNT_ID=dummy \
            -e CLOUDFLARE_R2_ACCESS_KEY=dummy \
            -e CLOUDFLARE_R2_SECRET_KEY=dummy \
            -e CLOUDFLARE_R2_BUCKET_NAME=dummy \
            -e CLOUDFLARE_R2_PUBLIC_URL_BASE=http://localhost \
            -e NOTIFICATION_MODE=noop \
            -e TURNSTILE_ENABLED=false \
            -e MISA_SYNC_ENABLED=false \
            -e PRECIOUS_METAL_USE_MOCK_DATA=true \
            -e RATE_LIMIT_ENABLED=false \
            -e RATE_LIMIT_AUTH_ENABLED=false \
            backend-service

      # Buoc 6: Cho Spring Boot start xong moi tiep tuc
      # until loop: lap vo han cho toi khi /actuator/health tra ve "UP"
      # timeout-minutes: GitHub Actions tu kill neu qua 15 phut (phong truong hop crash)
      - name: Wait for Spring Boot to be ready
        timeout-minutes: 15
        run: |
          echo "Waiting for Spring Boot application to start..."
          echo "Container status:"
          docker ps -a
          echo ""
          echo "Checking health endpoint every 5 seconds..."
          until curl -s http://localhost:8082/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
            # Neu container crash thi dung lai, in log ra de debug
            if ! docker ps --format '{{.Names}}' | grep -q backend; then
              echo "ERROR: Backend container crashed!"
              echo "=== DOCKER LOGS ==="
              docker logs backend
              exit 1
            fi
            echo "$(date +%H:%M:%S) - Spring Boot chua ready, cho 5s..."
            sleep 5
          done
          echo ""
          echo "Spring Boot is ready on localhost:8082!"
          curl -s http://localhost:8082/actuator/health

      # Buoc 7: Cai dat k6
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      # Buoc 8: Chay k6 performance test + xuat HTML report
      - name: Run k6 performance test
        run: |
          K6_WEB_DASHBOARD=true \
          K6_WEB_DASHBOARD_EXPORT=mirror-authentication-report.html \
          k6 run tests/mirror-test.js
        env:
          K6_USERNAME: ${{ secrets.SERVICE_USERNAME }}
          K6_PASSWORD: ${{ secrets.SERVICE_PASSWORD }}

      # Buoc 9: Deploy HTML report len GitHub Pages
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          include_files: mirror-authentication-report.html
          destination_dir: .
